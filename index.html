<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Browser OS  Windows 7 Style</title>
<link rel="stylesheet" href="style.css"></head>
<body>

 

  <!-- Desktop division -->
<div id="desktop" >

  <!-- Desktop icons will be injected by JS -->

</div>


<!-- To Display Taskbar -->
 <!-- note add title to all icons -->

<div id="taskbar">
  <button id="start-button" title="Start Menu"></button>
  <div id="taskbar-apps" ></div>
  <div id="system-tray">
    <div id="tray-clock"></div>
    <div id="date"></div>
  </div>
</div>

   <!-- Start Menu -->
<div id="start-menu" >
  <input type="text" id="start-menu-search" placeholder="Search programs and files" />
  <div id="start-menu-list" ></div>
</div>

<!-- right click menu list -->
<div id="context-menu">
  <ul>
    <li id="context-view">View</li>
    <li id="context-sort-by">Sort By</li>
    <li id="context-refresh">Refresh</li>
    <li id="context-new-folder">New </li>
    
  </ul>
</div>


<!-- Icon context right click menu -->
<div id="icon-context-menu">
  <ul>
    <li id="icon-context-open" >Open</li>
    <li id="icon-context-admin" >Open as Administrator</li>
    <li id="icon-context-delete" >Delete</li>
    <li id="icon-context-rename" >Rename</li>
    <li id="icon-context-properties" >Properties</li>

  </ul>
</div>

<!-- File Explorer Context Menu -->

<div id="explorer-context-menu">

  <ul>

    <li id="explorer-open">
      Open
    </li>

    <li id="explorer-rename">
      Rename
    </li>

    <li id="explorer-delete">
      Delete
    </li>

    <li id="explorer-properties">
      Properties
    </li>

  </ul>

</div>

</script>
</body>
</html>
